services:
  - type: web
    name: telegram-love-album-bot
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: RELATIONSHIP_START_DATE
        value: 2024-01-01
      - key: USER_NAME
        value: любимая
      - key: API_BASE
        value: https://api.telegram.org
      - key: TIMEOUT
        value: 60